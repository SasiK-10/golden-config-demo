server:
  port: 8080
  ssl:
    enabled: true
    key-store: /certs/keystore.p12
    key-store-type: PKCS12

spring:
  application:
    name: golden-demo-service
  datasource:
    url: jdbc:postgresql://prod-db.internal:5432/appdb
    username: app_user
    ssl: true
  security:
    require-ssl: true
  session:
    timeout: 45m

logging:
  level:
    root: DEBUG
    com.company: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  security:
    enabled: true

rate-limiting:
  enabled: true
  requests-per-minute: 100

monitoring:
  health-check:
    enabled: true
  backup:
    enabled: false
