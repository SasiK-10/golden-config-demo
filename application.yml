server:
  port: 8080
  ssl:
    enabled: true
    key-store: /certs/keystore.p12
    key-store-type: PKCS12

spring:
  application:
    name: golden-demo-service-v2
  datasource:
    url: jdbc:postgresql://prod-db-replica.internal:5432/appdb
    username: readonly_user
    ssl: true
  security:
    require-ssl: true
  session:
    timeout: 25m

logging:
  level:
    root: INFO
    com.company: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  security:
    enabled: true

rate-limiting:
  enabled: true
  requests-per-minute: 75

monitoring:
  health-check:
    enabled: true
  backup:
    enabled: true
